<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website | Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            color: #333;
        }

        header {
            background-color: #0d6efd;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to right, #0d6efd, #0b5ed7);
            color: white;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        .hero button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: white;
            color: #0d6efd;
            cursor: pointer;
        }

        .hero button:hover {
            background-color: #e9ecef;
        }

        .features {
            display: flex;
            gap: 20px;
            padding: 60px 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 2px;
            width: 580px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
            color: #0d6efd;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #222;
            color: #aaa;
        }
    </style>
</head>
<body>

    <header>
        <h1>MyWebsite</h1>
        <nav>
            <a href="/api/index">Home</a>
            <a href="/api/about">About</a>
            <a href="/api/results">Results</a>
            <a href="/api/contact">Contact</a>
        </nav>
    </header>
    {% if result %}
    <div class="card">
            <b>task id: </b> <p>{{result.id}}</p>
            <h3>task state: </h3> <p>{{result.state}}</p>
            <h3>task status: </h3> <p>{{result.status}}</p>
            <h4>task result: </h4> <p>{{result.result}}</p>
            
        </div>
    {% endif %}
    
</body>
</html>
